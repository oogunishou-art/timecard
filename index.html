<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>出退勤管理システム（テスト版）ver1.0.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:#F0F4F8;color:#1A2B3C;font-size:14px;min-height:100vh}

/* LOGIN */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;background:#0F1C2E}
.login-logo{font-size:24px;font-weight:600;color:#fff;margin-bottom:4px;font-family:'Noto Sans JP',sans-serif;text-align:center;line-height:1.4}
.login-ver{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:36px;letter-spacing:.05em;text-align:center}
.login-box{background:#fff;border-radius:18px;padding:26px;width:100%;max-width:340px;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.field-label{font-size:11px;color:#64748B;margin-bottom:6px;display:block;letter-spacing:.06em;text-transform:uppercase}
.login-input{width:100%;padding:13px 14px;border:1px solid #E2E8F0;border-radius:10px;font-size:22px;font-family:'Space Grotesk',sans-serif;outline:none;color:#1A2B3C;letter-spacing:.15em;margin-bottom:6px;transition:.2s}
.login-input:focus{border-color:#4A9FD5;box-shadow:0 0 0 3px rgba(74,159,213,.15)}
.login-btn{width:100%;padding:14px;background:#0F1C2E;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.login-btn:hover:not(:disabled){background:#1a2e46}
.login-btn:disabled{background:#94A3B8;cursor:not-allowed}
.login-err{font-size:12px;color:#E74C3C;margin-top:8px;text-align:center;min-height:18px}
.spinner{width:13px;height:13px;border:2px solid rgba(0,0,0,.1);border-top-color:#4A9FD5;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.spinner-white{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* APP */
.app{display:none;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;background:#F0F4F8}
.hdr{background:#0F1C2E;color:#fff;padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.hdr-eyebrow{font-size:10px;opacity:.5;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.hdr-name{font-size:17px;font-weight:500}
.hdr-sub{font-size:11px;opacity:.5;margin-top:2px;font-family:'Space Grotesk',sans-serif}
.logout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:12px;border-radius:20px;padding:6px 14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:.15s;white-space:nowrap}
.logout-btn:hover{background:rgba(255,255,255,.2)}
.tabs{background:#0F1C2E;display:flex;border-top:1px solid rgba(255,255,255,.08)}
.tab{flex:1;padding:11px 0;text-align:center;color:rgba(255,255,255,.4);font-size:13px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:.2s;font-family:'Noto Sans JP',sans-serif}
.tab.active{color:#fff;border-bottom-color:#4A9FD5}
.screen{display:none;padding:16px;flex:1}
.screen.active{display:block}

/* TODAY */
.today-card{background:#fff;border-radius:16px;border:1px solid #E8EDF2;padding:20px;margin-bottom:14px}
.today-date{font-size:12px;color:#64748B;margin-bottom:8px}
.today-status{display:flex;align-items:center;gap:9px;margin-bottom:18px}
.sdot{width:9px;height:9px;border-radius:50%;background:#CBD5E1;flex-shrink:0;transition:.3s}
.sdot.working{background:#2ECC71;box-shadow:0 0 0 3px rgba(46,204,113,.2)}
.sdot.done{background:#4A9FD5}
.slabel{font-size:16px;font-weight:500}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.time-box{background:#F8FAFC;border-radius:12px;padding:12px 14px;border:1px solid #EEF2F7}
.time-box label{font-size:10px;color:#94A3B8;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.tv{font-size:22px;font-weight:600;font-family:'Space Grotesk',sans-serif;color:#1A2B3C}
.tv.late{color:#F59E0B}
.tv.early{color:#F59E0B}
.tloc{font-size:10px;color:#4A9FD5;margin-top:3px;line-height:1.6;word-break:break-all}
.tloc a{color:#4A9FD5;text-decoration:none}
.tloc a:hover{text-decoration:underline}
.pin-wrap{height:36px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:12px}
.pin{font-size:24px;transform:translateY(-46px);opacity:0;transition:transform .55s cubic-bezier(.34,1.56,.64,1),opacity .3s}
.pin.drop{transform:translateY(0);opacity:1}
.punch-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-in,.btn-out{border:none;border-radius:14px;color:#fff;padding:16px 0;font-size:15px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.15s;width:100%;font-family:'Noto Sans JP',sans-serif}
.btn-in{background:#2ECC71}.btn-out{background:#E74C3C}
.btn-in:hover:not(:disabled){filter:brightness(1.07)}.btn-out:hover:not(:disabled){filter:brightness(1.07)}
.btn-in:active:not(:disabled),.btn-out:active:not(:disabled){transform:scale(.97)}
.btn-in:disabled{background:#A8E6C3;cursor:not-allowed}.btn-out:disabled{background:#F5B5AF;cursor:not-allowed}
.btn-sub{font-size:11px;opacity:.85}
.sync-note{font-size:11px;text-align:center;color:#94A3B8;margin-top:12px;line-height:1.8;min-height:20px}

/* CALENDAR */
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-nav-btn{background:#fff;border:1px solid #E8EDF2;border-radius:9px;padding:7px 14px;cursor:pointer;font-size:15px;color:#1A2B3C;transition:.15s}
.cal-nav-btn:hover{background:#F1F5F9}
.cal-month{font-size:16px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.dname{text-align:center;font-size:11px;color:#94A3B8;padding:5px 0}
.ccell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:9px;font-size:12px;cursor:pointer;position:relative;transition:.15s;color:#1A2B3C;flex-direction:column;gap:1px}
.ccell:hover{background:#E8EDF2}
.ccell.is-today{background:#0F1C2E;color:#fff;font-weight:500}
.ccell .di{width:4px;height:4px;border-radius:50%;background:#2ECC71}
.ccell.partial .di{background:#F59E0B}
.ccell.warn-cell .di{background:#F59E0B}
.ccell.is-today .di{background:#fff}
.ccell.off{color:#CBD5E1}
/* 打刻漏れマーカー */
.ccell.miss{background:#FEE2E2;border:1.5px solid #FCA5A5;border-radius:9px}
.ccell.miss.is-today{background:#0F1C2E;border-color:#0F1C2E}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,28,46,.6);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:#fff;border-radius:22px 22px 0 0;padding:22px 22px 34px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:#E2E8F0;border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:16px;font-weight:500;margin-bottom:4px}
.modal-sub{font-size:12px;color:#64748B;margin-bottom:16px}
.rec-row{padding:12px 0;border-bottom:1px solid #F1F5F9;display:flex;flex-direction:column;gap:5px}
.rec-row:last-child{border:none}
.rec-label{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:.05em}
.rec-val{font-size:18px;font-weight:500;font-family:'Space Grotesk',sans-serif;color:#1A2B3C}
.rec-val.late{color:#F59E0B}.rec-val.early{color:#F59E0B}
.warn-badge{display:inline-block;font-size:10px;background:#FEF3C7;color:#D97706;padding:2px 8px;border-radius:20px;margin-left:6px;font-weight:500;vertical-align:middle}
.rec-addr{font-size:12px;color:#1A2B3C}
.rec-coords{font-size:10px;color:#94A3B8;font-family:'Space Grotesk',sans-serif}
.map-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#4A9FD5;text-decoration:none;background:#EBF4FB;padding:4px 10px;border-radius:20px;margin-top:4px;font-weight:500}
.map-link:hover{background:#D5EAF7}
.edit-history{background:#F8FAFC;border-radius:8px;padding:8px 10px;border-left:3px solid #4A9FD5;font-size:11px;color:#64748B;line-height:1.7;margin-top:4px}
.edit-history strong{color:#1A2B3C;font-weight:500}
.modal-close{width:100%;margin-top:18px;padding:13px;background:#F8FAFC;border:1px solid #E8EDF2;border-radius:12px;font-size:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:#1A2B3C;transition:.15s}
.modal-close:hover{background:#EEF2F7}
.modal-empty{text-align:center;color:#94A3B8;padding:28px 0;font-size:13px}
.miss-notice{background:#FEE2E2;border-radius:8px;padding:8px 12px;font-size:12px;color:#DC2626;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* ADMIN */
.admin-toolbar{background:#fff;border-radius:14px;border:1px solid #E8EDF2;padding:14px 16px;margin-bottom:14px}
.toolbar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.toolbar-row:last-child{margin-bottom:0}
.toolbar-label{font-size:11px;color:#94A3B8;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;min-width:44px}
.date-input{flex:1;padding:8px 12px;border:1px solid #E8EDF2;border-radius:8px;font-size:14px;font-family:'Space Grotesk',sans-serif;color:#1A2B3C;outline:none;background:#F8FAFC}
.date-input:focus{border-color:#4A9FD5;box-shadow:0 0 0 2px rgba(74,159,213,.15)}
.group-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.group-scroll::-webkit-scrollbar{display:none}
.g-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid #E8EDF2;background:#F8FAFC;font-size:12px;cursor:pointer;transition:.15s;color:#1A2B3C}
.g-chip:hover{background:#F1F5F9}
.g-chip.active{background:#0F1C2E;color:#fff;border-color:#0F1C2E}
.admin-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sum-card{background:#fff;border-radius:10px;border:1px solid #E8EDF2;padding:10px 12px;text-align:center}
.sum-num{font-size:22px;font-weight:600;font-family:'Space Grotesk',sans-serif}
.sum-num.green{color:#2ECC71}.sum-num.blue{color:#4A9FD5}.sum-num.gray{color:#94A3B8}
.sum-label{font-size:10px;color:#94A3B8;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.staff-card{background:#fff;border-radius:14px;border:1px solid #E8EDF2;padding:15px 16px;margin-bottom:10px}
.staff-card.has-warn{border-color:#FCD34D;background:#FFFBEB}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.sc-name-btn{font-size:14px;font-weight:500;color:#0F1C2E;background:none;border:none;cursor:pointer;padding:0;text-align:left;font-family:'Noto Sans JP',sans-serif;text-decoration:underline;text-underline-offset:2px}
.sc-name-btn:hover{color:#4A9FD5}
.sc-id{font-size:11px;color:#94A3B8;font-family:'Space Grotesk',sans-serif;margin-top:2px}
.badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500;white-space:nowrap}
.b-working{background:#DCFCE7;color:#16A34A}.b-done{background:#DBEAFE;color:#1D4ED8}.b-absent{background:#F1F5F9;color:#94A3B8}
.sc-times{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px}
.sc-time label{font-size:10px;color:#94A3B8;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em}
.sc-time span{font-size:14px;font-weight:500;font-family:'Space Grotesk',sans-serif;color:#1A2B3C}
.sc-time span.late{color:#F59E0B}.sc-time span.early{color:#F59E0B}
.sc-warn{font-size:11px;color:#D97706;background:#FEF3C7;border-radius:6px;padding:5px 8px;margin-bottom:8px;line-height:1.5}
.loc-block{background:#F8FAFC;border-radius:8px;padding:8px 10px;margin-bottom:6px;border:1px solid #EEF2F7}
.loc-block-title{font-size:10px;color:#94A3B8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.loc-addr{font-size:12px;color:#1A2B3C;font-weight:500;margin-bottom:2px}
.loc-coords{font-size:10px;color:#94A3B8;font-family:'Space Grotesk',sans-serif;margin-bottom:4px}
.loc-map-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#4A9FD5;text-decoration:none;background:#EBF4FB;padding:3px 10px;border-radius:20px;font-weight:500}
.loc-map-btn:hover{background:#D5EAF7}
.edit-hist-block{background:#F0F7FF;border-radius:6px;padding:6px 10px;font-size:11px;color:#64748B;line-height:1.7;margin-bottom:6px;border-left:3px solid #4A9FD5}
.sc-btn-row{display:flex;gap:8px;margin-top:10px}
.sc-edit-btn{flex:1;padding:7px;background:#F8FAFC;border:1px solid #E8EDF2;border-radius:8px;font-size:12px;cursor:pointer;color:#64748B;font-family:'Noto Sans JP',sans-serif}
.sc-edit-btn:hover{background:#EEF2F7}
.admin-loading{text-align:center;color:#94A3B8;padding:32px 0;font-size:13px}

/* EDIT MODAL */
.edit-section-title{font-size:13px;font-weight:500;color:#1A2B3C;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #E8EDF2}
.edit-label{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:block}
.edit-input{width:100%;padding:10px 12px;border:1px solid #E8EDF2;border-radius:8px;font-size:16px;font-family:'Space Grotesk',sans-serif;color:#1A2B3C;outline:none;background:#F8FAFC;margin-bottom:8px}
.edit-input:focus{border-color:#4A9FD5;box-shadow:0 0 0 2px rgba(74,159,213,.15)}
.edit-textarea{width:100%;padding:10px 12px;border:1px solid #E8EDF2;border-radius:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:#1A2B3C;outline:none;background:#F8FAFC;resize:vertical;min-height:60px;line-height:1.6;margin-bottom:14px}
.edit-textarea:focus{border-color:#4A9FD5;box-shadow:0 0 0 2px rgba(74,159,213,.15)}
.edit-save-btn{width:100%;padding:13px;background:#0F1C2E;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:4px;transition:.15s}
.edit-save-btn:hover{background:#1a2e46}
.edit-note{font-size:11px;color:#94A3B8;margin-top:8px;text-align:center;min-height:16px}

/* ADMIN MONTH MODAL（社員名タップ） */
.month-day-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #F1F5F9;cursor:pointer;transition:.15s}
.month-day-item:hover{background:#F8FAFC;border-radius:6px;padding-left:6px}
.month-day-item:last-child{border:none}
.mdi-left{display:flex;flex-direction:column;gap:3px}
.mdi-date{font-size:13px;font-weight:500}
.mdi-times{display:flex;gap:12px}
.mdi-t{font-size:12px;color:#94A3B8}
.mdi-t span{color:#1A2B3C;font-family:'Space Grotesk',sans-serif;font-weight:500}
.mdi-t span.late{color:#F59E0B}.mdi-t span.early{color:#F59E0B}
.mdi-badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap;align-self:center}
.mdi-arrow{color:#94A3B8;font-size:16px}

/* PDF SCREEN */
.pdf-card{background:#fff;border-radius:14px;border:1px solid #E8EDF2;padding:20px;margin-bottom:14px}
.pdf-title{font-size:15px;font-weight:500;margin-bottom:16px;color:#1A2B3C}
.pdf-field{margin-bottom:14px}
.pdf-field label{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px}
.pdf-select{width:100%;padding:10px 12px;border:1px solid #E8EDF2;border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:#1A2B3C;outline:none;background:#F8FAFC;appearance:none;cursor:pointer}
.pdf-select:focus{border-color:#4A9FD5}
.pdf-generate-btn{width:100%;padding:14px;background:#0F1C2E;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.pdf-generate-btn:hover{background:#1a2e46}
.pdf-generate-btn:disabled{background:#94A3B8;cursor:not-allowed}
.pdf-note{font-size:11px;color:#94A3B8;text-align:center;margin-top:10px;line-height:1.7}
.pdf-status{font-size:13px;color:#64748B;text-align:center;margin-top:12px;min-height:20px}

/* 位置情報確認ダイアログ */
.loc-dialog-overlay{display:none;position:fixed;inset:0;background:rgba(15,28,46,.7);z-index:500;align-items:center;justify-content:center;padding:24px}
.loc-dialog-overlay.open{display:flex}
.loc-dialog{background:#fff;border-radius:18px;padding:24px;width:100%;max-width:340px;box-shadow:0 16px 48px rgba(0,0,0,.3)}
.loc-dialog-icon{font-size:36px;text-align:center;margin-bottom:10px}
.loc-dialog-title{font-size:16px;font-weight:500;color:#1A2B3C;text-align:center;margin-bottom:8px}
.loc-dialog-body{font-size:13px;color:#64748B;text-align:center;line-height:1.7;margin-bottom:20px}
.loc-dialog-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.loc-btn-yes{padding:13px;background:#0F1C2E;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:.15s}
.loc-btn-yes:hover{background:#1a2e46}
.loc-btn-no{padding:13px;background:#F8FAFC;color:#64748B;border:1px solid #E8EDF2;border-radius:10px;font-size:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:.15s}
.loc-btn-no:hover{background:#EEF2F7}

.loading-overlay{position:fixed;inset:0;background:#0F1C2E;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s}
.loading-overlay.hide{opacity:0;pointer-events:none}
.loading-logo{font-size:20px;font-weight:600;color:#fff;font-family:'Noto Sans JP',sans-serif;margin-bottom:4px;text-align:center;line-height:1.5}
.loading-ver{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:32px}
.loading-bar{width:160px;height:2px;background:rgba(255,255,255,.1);border-radius:1px;overflow:hidden}
.loading-bar-inner{height:100%;background:#4A9FD5;border-radius:1px;animation:loading 1.4s ease-in-out infinite}
@keyframes loading{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-logo">出退勤管理システム<br>（テスト版）ver1.0.0</div>
  <div class="loading-ver">Firebase に接続中…</div>
  <div class="loading-bar"><div class="loading-bar-inner"></div></div>
</div>

<div class="login-wrap" id="login-screen" style="display:none">
  <div class="login-logo">出退勤管理システム<br>（テスト版）</div>
  <div class="login-ver">ver1.0.0</div>
  <div class="login-box">
    <label class="field-label">社員NO</label>
    <input class="login-input" id="login-input" type="tel" placeholder="0000" maxlength="6"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">
      <div class="spinner-white" id="login-spinner" style="display:none"></div>
      <span id="login-btn-text">ログイン</span>
    </button>
  </div>
</div>

<div class="app" id="main-app">
  <div class="hdr">
    <div>
      <div class="hdr-eyebrow">出退勤管理システム</div>
      <div class="hdr-name" id="hdr-name"></div>
      <div class="hdr-sub" id="hdr-sub"></div>
    </div>

<script type="module">

  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const DAYS  = ['日','月','火','水','木','金','土'];

const STAFF = {

  '0123': { name:'金築　ゆみ子',   group:'経理',  isLeader:true,  isAdmin:false },
  '0124': { name:'周藤　美穂',     group:'経理',  isLeader:false, isAdmin:false },
  '0132': { name:'大國　将',       group:'経理',  isLeader:true,  isAdmin:false },
  '0133': { name:'テスト長',       group:'テスト',isLeader:true,  isAdmin:false },
  '0134': { name:'テスト①',       group:'テスト',isLeader:false, isAdmin:false },
  '0135': { name:'テスト②',       group:'テスト',isLeader:false, isAdmin:false },
};
const ALL_GROUPS = ['全員','経理','テスト'];
const LATE_MIN  = 8*60+1;
const EARLY_MIN = 16*60+59;

let me=null, calY, calM, activeGroup='全員';
let todayUnsub=null;
let editTarget={staffId:null,dateKey:null};
let staffMonthTarget={staffId:null,year:null,month:null};

/* ── utils ── */
const dkey = d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const nowHHMM=()=>{const n=new Date();return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;};
const toMin=t=>{if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m;};
const isLate =t=>t&&toMin(t)>LATE_MIN;
const isEarly=t=>t&&toMin(t)<EARLY_MIN;
const mapsUrl=(lat,lng)=>`https://www.google.com/maps?q=${lat},${lng}&z=17`;
const mapsLink=(lat,lng,label='地図')=>`<a class="map-link" href="${mapsUrl(lat,lng)}" target="_blank" rel="noopener">🗺 ${label}</a>`;

function locBlockHtml(label,addr,lat,lng){
  if(!addr&&!lat)return '';
  const coords=lat?`${parseFloat(lat).toFixed(5)}, ${parseFloat(lng).toFixed(5)}`:'';
  const mapBtn=lat?`<a class="loc-map-btn" href="${mapsUrl(lat,lng)}" target="_blank" rel="noopener">🗺 Googleマップで確認</a>`:'';
  return `<div class="loc-block"><div class="loc-block-title">${label}</div>${addr?`<div class="loc-addr">📍 ${addr}</div>`:''} ${coords?`<div class="loc-coords">${coords}</div>`:''} ${mapBtn}</div>`;
}
function locStatusBadgeHtml(status){
  const LST={
    ok:     {label:'📍 位置情報あり',           color:'#16A34A',bg:'#DCFCE7'},
    failed: {label:'⚠️ 取得失敗（電波・GPS不良）',color:'#D97706',bg:'#FEF3C7'},
    denied: {label:'✕ 位置情報なし（本人辞退）', color:'#DC2626',bg:'#FEE2E2'},
  };
  if(!status)return '';
  const s=LST[status]||LST.denied;
  return `<span style="display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;background:${s.bg};color:${s.color};font-weight:500;margin-top:4px">${s.label}</span>`;
}

function locModalHtml(addr,lat,lng,status){
  const badge=locStatusBadgeHtml(status);
  if(!addr&&!lat) return badge; // ステータスだけ表示
  const coords=lat?`${parseFloat(lat).toFixed(5)}, ${parseFloat(lng).toFixed(5)}`:'';
  return `${badge}${addr?`<div class="rec-addr">📍 ${addr}</div>`:''} ${coords?`<div class="rec-coords">${coords}</div>`:''} ${lat?mapsLink(lat,lng,'Googleマップで確認'):''}`;
}

onValue(ref(db,'.info/connected'),snap=>{
  const lo=document.getElementById('loading-overlay');

  let sub=id;
  if(s.isAdmin)       sub+='　|　システム管理者';
  else if(s.isLeader) sub+=`　|　${s.group}　（所属長）`;

/* ── 管理タブ初期化 ── */
function initAdminTab(){
  const s=STAFF[me];
  const now=new Date();
  document.getElementById('admin-date-input').value=dkey(now);
  const groups=s.isAdmin?ALL_GROUPS:[s.group];

window.selectGroup=function(g){

/* ── 管理データ読み込み（日付変更で自動更新） ── */
window.loadAdminData=async function(){
  const dateVal=document.getElementById('admin-date-input').value;
  if(!dateVal)return;
  const list=document.getElementById('admin-list');
  const summary=document.getElementById('admin-summary');
  list.innerHTML='<div class="admin-loading">データを読み込み中…</div>';
  summary.innerHTML='';
  const canEdit=STAFF[me].isLeader||STAFF[me].isAdmin;
  const targets=Object.entries(STAFF).filter(([,s])=>{
    if(s.isAdmin)return false;
    if(activeGroup==='全員')return true;
    return s.group===activeGroup;
  });
  const records={};
  await Promise.all(targets.map(async([id])=>{
    const snap=await get(ref(db,`records/${id}/${dateVal}`));
    records[id]=snap.val()||{};
  }));
  let cntW=0,cntD=0,cntA=0;
  targets.forEach(([id])=>{
    const r=records[id];
    if(r.outTime)cntD++;else if(r.inTime)cntW++;else cntA++;
  });
  summary.innerHTML=`
    <div class="sum-card"><div class="sum-num green">${cntW}</div><div class="sum-label">出勤中</div></div>
    <div class="sum-card"><div class="sum-num blue">${cntD}</div><div class="sum-label">退勤済</div></div>
    <div class="sum-card"><div class="sum-num gray">${cntA}</div><div class="sum-label">未出勤</div></div>`;
  list.innerHTML='';
  const sorted=[...targets].sort((a,b)=>{
    if(a[1].group<b[1].group)return -1;if(a[1].group>b[1].group)return 1;return a[0].localeCompare(b[0]);
  });
  sorted.forEach(([id,s])=>{
    const r=records[id];
    let badge,bcls;
    if(r.outTime){badge='退勤済';bcls='b-done';}
    else if(r.inTime){badge='出勤中';bcls='b-working';}
    else{badge='未出勤';bcls='b-absent';}
    const late=isLate(r.inTime),early=isEarly(r.outTime);
    const hasWarn=late||early;
    const leaderLabel=s.isLeader?'　（所属長）':'';
    let warnHtml='';
    if(late)  warnHtml+=`<div class="sc-warn">⚠️ 出勤 ${r.inTime} — 8:01以降（遅刻の可能性）</div>`;
    if(early) warnHtml+=`<div class="sc-warn">⚠️ 退勤 ${r.outTime} — 16:59以前（早退・時間給の可能性）</div>`;
    /* 修正履歴（出勤・退勤別々） */
    let histHtml='';
    if(r.inEditReason)  histHtml+=`<div class="edit-hist-block">📝 <strong>出勤修正：</strong>${r.inEditReason}　<span style="color:#94A3B8;font-size:10px">${r.inEditBy||''}　${r.inEditAt||''}</span></div>`;
    if(r.outEditReason) histHtml+=`<div class="edit-hist-block">📝 <strong>退勤修正：</strong>${r.outEditReason}　<span style="color:#94A3B8;font-size:10px">${r.outEditBy||''}　${r.outEditAt||''}</span></div>`;
    /* 位置情報ステータスバッジ */
    const LOC_ST={
      ok:     {label:'📍 位置情報あり',           color:'#16A34A',bg:'#DCFCE7'},
      failed: {label:'⚠️ 取得失敗（電波・GPS不良）',color:'#D97706',bg:'#FEF3C7'},
      denied: {label:'✕ 位置情報なし（本人辞退）', color:'#DC2626',bg:'#FEE2E2'},
    };
    function locBadge(status){
      if(!status)return '';
      const s=LOC_ST[status]||LOC_ST.denied;
      return `<span style="display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;background:${s.bg};color:${s.color};font-weight:500;margin-bottom:4px">${s.label}</span>`;
    }
    const inLocBadge  = locBadge(r.inLocStatus);
    const outLocBadge = locBadge(r.outLocStatus);
    const inLocHtml  = inLocBadge  + locBlockHtml('出勤場所',r.inAddr, r.inLat, r.inLng);
    const outLocHtml = outLocBadge + locBlockHtml('退勤場所',r.outAddr,r.outLat,r.outLng);
    const editBtn=canEdit?`<button class="sc-edit-btn" onclick="openEdit('${id}','${dateVal}')">時刻を修正</button>`:'';
    const [y,mo]=dateVal.split('-');
    list.innerHTML+=`
      <div class="staff-card${hasWarn?' has-warn':''}">
        <div class="sc-top">
          <div>
            <button class="sc-name-btn" onclick="openStaffMonth('${id}','${y}','${mo}')">${s.name}${leaderLabel}</button>
            <div class="sc-id">${id}　${s.group}</div>
          </div>
          <div class="badge ${bcls}">${badge}</div>
        </div>
        <div class="sc-times">
          <div class="sc-time"><label>出勤</label><span class="${late?'late':''}">${r.inTime||'—'}${r.inModified?'*':''}</span></div>
          <div class="sc-time"><label>退勤</label><span class="${early?'early':''}">${r.outTime||'—'}${r.outModified?'*':''}</span></div>
        </div>
        ${warnHtml}${inLocHtml}${outLocHtml}${histHtml}
        <div class="sc-btn-row">${editBtn}</div>
      </div>`;
  });
};

/* ── 社員名タップ → 月内一覧モーダル ── */
window.openStaffMonth=async function(staffId,y,mo){
  staffMonthTarget={staffId,year:y,month:mo};
  const s=STAFF[staffId];

  }
  if(!body) body='<div class="modal-empty">記録がありません</div>';

window.saveEdit=async function(){
  const doIn  = document.getElementById('edit-in-check').checked;
  const doOut = document.getElementById('edit-out-check').checked;
  const note  = document.getElementById('edit-note');

  /* 最低1つチェックされているか */
  if(!doIn&&!doOut){
    note.textContent='修正する項目（出勤 / 退勤）をチェックしてください';
    note.style.color='#E74C3C';return;
  }

  const inTime   = doIn  ? document.getElementById('edit-in-time').value   : '';
  const outTime  = doOut ? document.getElementById('edit-out-time').value  : '';
  const inReason = doIn  ? document.getElementById('edit-in-reason').value.trim()  : '';
  const outReason= doOut ? document.getElementById('edit-out-reason').value.trim() : '';

  /* チェックした項目の時刻・事由が入力されているか */
  if(doIn  && !inTime)   {note.textContent='修正後の出勤時刻を入力してください';note.style.color='#E74C3C';return;}
  if(doIn  && !inReason) {note.textContent='出勤時刻の修正事由を入力してください';note.style.color='#E74C3C';return;}
  if(doOut && !outTime)  {note.textContent='修正後の退勤時刻を入力してください';note.style.color='#E74C3C';return;}
  if(doOut && !outReason){note.textContent='退勤時刻の修正事由を入力してください';note.style.color='#E74C3C';return;}

  note.textContent='保存中…';note.style.color='#94A3B8';
  try{
    const recRef=ref(db,`records/${editTarget.staffId}/${editTarget.dateKey}`);
    const snap=await get(recRef);
    const existing=snap.val()||{};
    const now=new Date();
    const editAt=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const upd={...existing};
    if(doIn){
      upd.inTime=inTime;
      upd.inModified=true;
      upd.inEditReason=inReason;
      upd.inEditBy=STAFF[me].name;
      upd.inEditAt=editAt;
    }
    if(doOut){
      upd.outTime=outTime;
      upd.outModified=true;
      upd.outEditReason=outReason;
      upd.outEditBy=STAFF[me].name;
      upd.outEditAt=editAt;
    }
    await set(recRef,upd);
    note.textContent='✅ 保存しました';note.style.color='#2ECC71';
    setTimeout(()=>{closeEdit();loadAdminData();},1000);
  }catch(e){note.textContent='❌ 保存失敗: '+e.message;note.style.color='#E74C3C';}
};

/* ── GPS取得 ── */
async function getLocationData(){
  return new Promise(resolve=>{
    if(!navigator.geolocation){resolve({addr:'位置情報非対応',lat:null,lng:null});return;}
    navigator.geolocation.getCurrentPosition(
      async pos=>{
        const lat=pos.coords.latitude,lng=pos.coords.longitude;
        let addr='';
        try{
          const PREF={'01':'北海道','02':'青森県','03':'岩手県','04':'宮城県','05':'秋田県','06':'山形県','07':'福島県','08':'茨城県','09':'栃木県','10':'群馬県','11':'埼玉県','12':'千葉県','13':'東京都','14':'神奈川県','15':'新潟県','16':'富山県','17':'石川県','18':'福井県','19':'山梨県','20':'長野県','21':'岐阜県','22':'静岡県','23':'愛知県','24':'三重県','25':'滋賀県','26':'京都府','27':'大阪府','28':'兵庫県','29':'奈良県','30':'和歌山県','31':'鳥取県','32':'島根県','33':'岡山県','34':'広島県','35':'山口県','36':'徳島県','37':'香川県','38':'愛媛県','39':'高知県','40':'福岡県','41':'佐賀県','42':'長崎県','43':'熊本県','44':'大分県','45':'宮崎県','46':'鹿児島県','47':'沖縄県'};
          const gsiRes=await fetch(`https://mreversegeocoder.gsi.go.jp/reverse-geocoder/LonLatToAddress?lat=${lat}&lon=${lng}`);
          const gsiJson=await gsiRes.json();
          if(gsiJson&&gsiJson.results){
            const r=gsiJson.results;
            const muniCd=String(r.muniCd);
            const pref=PREF[muniCd.slice(0,2)]||'';
            let city='';
            try{
              const muniRes=await fetch('https://maps.gsi.go.jp/js/muni.js');
              const muniText=await muniRes.text();
              const rex=new RegExp(`"${muniCd.slice(-4)}"\\s*:\\s*'[^']*,[^,]*,${muniCd.slice(-4)},([^']+)'`);
              const match=muniText.match(rex);
              if(match)city=match[1].trim();
            }catch(e){}
            addr=pref+city+(r.lv01Nm||'');
          }
        }catch(e){}
        resolve({addr:addr||`${lat.toFixed(5)},${lng.toFixed(5)}`,lat,lng});
      },
      err=>{
        if(err.code===1){
          // ユーザーが明示的に「拒否」→ nullを返して打刻をブロック
          resolve({addr:null, lat:null, lng:null, denied:true});
        } else {
          // 電波不良・タイムアウト→ 打刻は許可、記録に明記
          resolve({addr:'位置情報取得失敗（電波・GPS不良）', lat:null, lng:null, denied:false});
        }
      },
      {timeout:12000,enableHighAccuracy:true}
    );
  });
}

/* ── 打刻（位置情報確認ダイアログ付き） ── */
let _punchPendingType=null;

window.punch=function(type){
  /* ボタンを即時無効化 */
  document.getElementById('btn-in').disabled=true;
  document.getElementById('btn-out').disabled=true;

/* はい・いいえはグローバル関数として定義（onclick属性から呼び出す） */
window.locAnswerYes=async function(){
  document.getElementById('loc-dialog-overlay').classList.remove('open');
  const note=document.getElementById('sync-note');
  note.textContent='📡 位置情報を取得中…';
  const locData=await getLocationData();
  if(!locData.lat){
    /* はい選択だが取得失敗（電波不良等） */
    await doPunch(_punchPendingType,'',null,null,'failed');
  } else {
    /* はい選択・取得成功 */
    await doPunch(_punchPendingType, locData.addr, locData.lat, locData.lng, 'ok');
  }

window.locAnswerNo=async function(){
  document.getElementById('loc-dialog-overlay').classList.remove('open');
  /* いいえ選択→位置情報なしで必ず打刻する */
  await doPunch(_punchPendingType, '', null, null, 'denied');
};

/* 実際の打刻処理 */
/* locStatus の値と表示定義
   'ok'      : はい選択・取得成功
   'failed'  : はい選択・取得失敗（電波不良等）
   'denied'  : いいえ選択
*/
const LOC_STATUS={
  ok:     {label:'📍 位置情報あり',       color:'#16A34A', bg:'#DCFCE7'},
  failed: {label:'⚠️ 取得失敗（電波不良）',color:'#D97706', bg:'#FEF3C7'},
  denied: {label:'✕ 位置情報なし（本人辞退）', color:'#DC2626', bg:'#FEE2E2'},
};

async function doPunch(type, addr, lat, lng, locStatus){
  const note=document.getElementById('sync-note');
  const time=nowHHMM();
  const todayKey=dkey(new Date());
  const recRef=ref(db,`records/${me}/${todayKey}`);
  try{
    const snap=await get(recRef);
    const upd={...(snap.val()||{}),staffName:STAFF[me].name,group:STAFF[me].group};
    if(type==='in'){
      upd.inTime=time;
      upd.inAddr=addr||'';
      upd.inLocStatus=locStatus;           // 位置情報取得状況を保存
      if(lat!==null){upd.inLat=lat;upd.inLng=lng;}
    } else {
      upd.outTime=time;
      upd.outAddr=addr||'';
      upd.outLocStatus=locStatus;          // 位置情報取得状況を保存
      if(lat!==null){upd.outLat=lat;upd.outLng=lng;}
    }
    await set(recRef,upd);
    const pin=document.getElementById('pin');
    pin.classList.remove('drop');void pin.offsetWidth;
    setTimeout(()=>pin.classList.add('drop'),30);
    const warn=(type==='in'&&isLate(time))?' ⚠️ 遅刻':(type==='out'&&isEarly(time))?' ⚠️ 早退':'';
    const st=LOC_STATUS[locStatus]||LOC_STATUS.denied;
    note.textContent=`✅ ${type==='in'?'出勤':'退勤'} ${time}${warn}　${st.label}${addr&&locStatus==='ok'?' '+addr:''}`;
    setTimeout(()=>{note.textContent='Firebase リアルタイム同期中';},4000);
  }catch(e){
    note.textContent='❌ 保存失敗: '+e.message;
    const curSnap=await get(ref(db,`records/${me}/${todayKey}`));
    const curRec=curSnap.val()||{};
    document.getElementById('btn-in').disabled=!!curRec.inTime;
    document.getElementById('btn-out').disabled=!curRec.inTime||!!curRec.outTime;
  }
}

/* ── カレンダー（打刻漏れマーカー付き） ── */
window.calShift=function(dir){calM+=dir;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderCal();};
async function renderCal(){
  document.getElementById('cal-month').textContent=`${calY}年${calM+1}月`;
  document.getElementById('cal-head').innerHTML=DAYS.map(d=>`<div class="dname">${d}</div>`).join('');
  const first=new Date(calY,calM,1),last=new Date(calY,calM+1,0),today=new Date();
  const snap=await get(ref(db,`records/${me}`));
  const all=snap.val()||{};
  let html='';
  for(let i=0;i<first.getDay();i++) html+='<div></div>';
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(calY,calM,d),dk=dkey(date);
    const isToday=dk===dkey(today);
    const isPast=date<today&&!isToday;
    const rec=all[dk];
    const isOff=date.getDay()===0||date.getDay()===6;
    const hasWarn=rec&&(isLate(rec.inTime)||isEarly(rec.outTime));
    /* 打刻漏れ：過去の平日で出勤or退勤どちらかがない */
    const isMiss=isPast&&!isOff&&(!rec||!rec.inTime||!rec.outTime);
    let cls='ccell';
    if(isToday)cls+=' is-today';
    else if(isMiss)cls+=' miss';
    if(isOff)cls+=' off';
    if(hasWarn)cls+=' warn-cell';
    let dot='';
    if(rec&&rec.inTime) dot='<div class="di"></div>';
    html+=`<div class="${cls}" onclick="openMyModal('${dk}')">${d}${dot}</div>`;
  }
  document.getElementById('cal-body').innerHTML=html;
}

  document.getElementById('m-sub').textContent=STAFF[me].name;
  const late2=isLate(rec.inTime),early2=isEarly(rec.outTime);
  let body='';
  /* 打刻漏れ警告 */
  if(isPast&&!isOff&&(!rec||!rec.inTime||!rec.outTime)){
    body+=`<div class="miss-notice">⚠️ 打刻漏れの可能性があります。所属長にご確認ください。</div>`;
  }
  if(!rec.inTime&&!rec.outTime){
    body+='<div class="modal-empty">この日の記録はありません</div>';
  }else{
    const inW=late2?'<span class="warn-badge">⚠ 遅刻</span>':'';
    const outW=early2?'<span class="warn-badge">⚠ 早退</span>':'';
    const inMod=rec.inModified?'<span style="font-size:10px;color:#4A9FD5;margin-left:6px">修正済</span>':'';
    const outMod=rec.outModified?'<span style="font-size:10px;color:#4A9FD5;margin-left:6px">修正済</span>':'';
    body+=`<div class="rec-row">
      <div class="rec-label">出勤時刻</div>
      <div class="rec-val${late2?' late':''}">${rec.inTime||'——'}${inW}${inMod}</div>
      ${locModalHtml(rec.inAddr,rec.inLat,rec.inLng,rec.inLocStatus)}
      ${rec.inEditReason?`<div class="edit-history">📝 <strong>出勤時刻の修正履歴</strong><br>・修正者：${rec.inEditBy||'不明'}<br>・修正日時：${rec.inEditAt||''}<br>・修正事由：${rec.inEditReason}</div>`:''}
    </div>`;
    body+=`<div class="rec-row">
      <div class="rec-label">退勤時刻</div>
      <div class="rec-val${early2?' early':''}">${rec.outTime||'—— 勤務中'}${outW}${outMod}</div>
      ${locModalHtml(rec.outAddr,rec.outLat,rec.outLng,rec.outLocStatus)}
      ${rec.outEditReason?`<div class="edit-history">📝 <strong>退勤時刻の修正履歴</strong><br>・修正者：${rec.outEditBy||'不明'}<br>・修正日時：${rec.outEditAt||''}<br>・修正事由：${rec.outEditReason}</div>`:''}
    </div>`;
  }
  document.getElementById('m-body').innerHTML=body;
  document.getElementById('modal-overlay').classList.add('open');
};
window.closeModal=function(){document.getElementById('modal-overlay').classList.remove('open');};

/* ══════════════════════════════════
   PDF出力（A4横・グループ別・Canvas日本語描画）
══════════════════════════════════ */

/* Canvas上に日本語テキストを描画してjsPDFにimageとして貼り付ける */
function jpText(doc, text, x, y, opts={}){
  const {size=6,color='#1A2B3C',bold=false,align='left',maxW=null}=opts;
  const canvas=document.createElement('canvas');
  const scale=4; // 高解像度
  const fs=size*scale;
  canvas.height=Math.ceil(fs*1.6);
  const measCtx=canvas.getContext('2d');
  measCtx.font=`${bold?'bold ':''} ${fs}px 'Noto Sans JP',sans-serif`;
  let displayText=text;
  if(maxW){
    // 幅に収まるよう切り詰め
    const maxPx=maxW*scale*3.78; // mm→px近似
    while(displayText.length>1&&measCtx.measureText(displayText).width>maxPx){
      displayText=displayText.slice(0,-1);
    }
  }
  const tw=measCtx.measureText(displayText).width;
  canvas.width=Math.ceil(tw)+4;
  const ctx=canvas.getContext('2d');
  ctx.font=`${bold?'bold ':''} ${fs}px 'Noto Sans JP',sans-serif`;
  ctx.fillStyle=color;
  ctx.textBaseline='top';
  ctx.fillText(displayText,2,2);
  const imgData=canvas.toDataURL('image/png');
  const wMm=canvas.width/scale/3.78;
  const hMm=canvas.height/scale/3.78;
  let drawX=x;
  if(align==='center') drawX=x-wMm/2;
  if(align==='right')  drawX=x-wMm;
  doc.addImage(imgData,'PNG',drawX,y-hMm*0.75,wMm,hMm);
}

window.generatePDF=async function(){
  const monthVal=document.getElementById('pdf-month').value;
  const groupSel=document.getElementById('pdf-group').value;
  if(!monthVal){document.getElementById('pdf-status').textContent='年月を選択してください';return;}
  const[y,mo]=monthVal.split('-');
  const btn=document.getElementById('pdf-btn');
  const status=document.getElementById('pdf-status');
  btn.disabled=true;status.textContent='データを取得中…';

  const DOW_JP=['日','月','火','水','木','金','土'];
  const groups=groupSel==='all'?['経理','テスト']:[groupSel];

  const allStaff=Object.entries(STAFF).filter(([,s])=>!s.isAdmin);
  const allData={};
  await Promise.all(allStaff.map(async([id])=>{
    const snap=await get(ref(db,`records/${id}`));
    allData[id]=snap.val()||{};
  }));

  status.textContent='PDFを生成中…';

  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const PW=297,PH=210;
  const daysInMonth=new Date(+y,+mo,0).getDate();
  const today=new Date();
  const outputDate=`${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日出力`;

  let firstPage=true;
  for(const group of groups){
    const members=allStaff.filter(([,s])=>s.group===group);
    if(!members.length)continue;
    if(!firstPage)doc.addPage();
    firstPage=false;

    const marginL=8,marginT=16,marginR=8;
    const headerH=11;
    const colNameW=26;
    const availW=PW-marginL-marginR-colNameW;
    const dayW=availW/daysInMonth;
    const rowH=Math.min(15,(PH-marginT-8-headerH-10)/members.length);
    const tableTop=marginT+headerH;

    /* タイトル */
    jpText(doc,`${y}年${+mo}月　出退勤記録　【${group}グループ】`,marginL,marginT-3,{size:10,bold:true,color:'#0F1C2E'});
    jpText(doc,outputDate,PW-marginR-28,marginT-3,{size:7,color:'#64748B',align:'right'});

    /* 日付ヘッダー背景 */
    doc.setFillColor(15,28,46);
    doc.rect(marginL+colNameW,marginT,availW,headerH,'F');

    /* 社員名ヘッダー背景 */
    doc.rect(marginL,marginT,colNameW,headerH,'F');
    jpText(doc,'社員名',marginL+colNameW/2,marginT+headerH*0.65,{size:7,bold:true,color:'#FFFFFF',align:'center'});

    /* 日付セル */
    for(let d=1;d<=daysInMonth;d++){
      const cx=marginL+colNameW+(d-1)*dayW+dayW/2;
      const dateObj=new Date(+y,+mo-1,d);
      const dow=DOW_JP[dateObj.getDay()];
      const isOff=dateObj.getDay()===0||dateObj.getDay()===6;
      const col=isOff?'#96D2FF':'#FFFFFF';
      jpText(doc,String(d),cx,marginT+headerH*0.38,{size:6,color:col,align:'center'});
      jpText(doc,dow,cx,marginT+headerH*0.82,{size:6,color:col,align:'center'});
    }

    /* 社員行 */
    members.forEach(([id,s],ri)=>{
      const rowY=tableTop+ri*rowH;
      doc.setFillColor(ri%2===0?248:255,ri%2===0?250:255,ri%2===0?252:255);
      doc.rect(marginL,rowY,PW-marginL-marginR,rowH,'F');

      /* 社員名・ID */
      jpText(doc,s.name,marginL+1,rowY+rowH*0.42,{size:6.5,bold:true,color:'#1A2B3C',maxW:colNameW-2});
      jpText(doc,id,marginL+1,rowY+rowH*0.82,{size:5.5,color:'#64748B'});

      /* 各日 */
      for(let d=1;d<=daysInMonth;d++){
        const dk=`${y}-${mo}-${String(d).padStart(2,'0')}`;
        const r=(allData[id]||{})[dk]||{};
        const cellX=marginL+colNameW+(d-1)*dayW;
        const dateObj=new Date(+y,+mo-1,d);
        const isOff=dateObj.getDay()===0||dateObj.getDay()===6;

        if(isOff){doc.setFillColor(240,244,248);doc.rect(cellX,rowY,dayW,rowH,'F');}

        doc.setDrawColor(220,228,235);
        doc.rect(cellX,rowY,dayW,rowH,'S');

        const cx=cellX+dayW/2;
        if(r.inTime||r.outTime){
          const late=isLate(r.inTime),early=isEarly(r.outTime);
          if(late||early){doc.setFillColor(255,251,235);doc.rect(cellX,rowY,dayW,rowH,'F');}
          jpText(doc,r.inTime||'',cx,rowY+rowH*0.38,{size:5,color:late?'#D97706':'#1A2B3C',align:'center'});
          jpText(doc,r.outTime||'',cx,rowY+rowH*0.78,{size:5,color:early?'#D97706':'#1A2B3C',align:'center'});
          if(r.inModified||r.outModified){
            jpText(doc,'修',cellX+dayW-1.5,rowY+2.5,{size:4,color:'#4A9FD5',align:'right'});
          }
        } else if(!isOff){
          jpText(doc,'－',cx,rowY+rowH*0.58,{size:5.5,color:'#CBD5E1',align:'center'});
        }
      }

      /* 外枠 */
      doc.setDrawColor(180,195,210);
      doc.rect(marginL,rowY,colNameW,rowH,'S');
      doc.rect(marginL+colNameW,rowY,availW,rowH,'S');
    });

    /* 凡例 */
    const legY=tableTop+members.length*rowH+4;
    jpText(doc,'※ 修 = 修正済　黄色背景 = 遅刻（8:01以降）または早退（16:59以前）　水色曜日 = 土日休日',marginL,legY,{size:5.5,color:'#64748B'});
  }

  doc.save(`出退勤記録_${y}年${mo}月.pdf`);
  btn.disabled=false;
  status.textContent=`✅ 出退勤記録_${y}年${mo}月.pdf をダウンロードしました`;
  setTimeout(()=>{status.textContent='';},4000);
};
</script>
