<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TimeCard｜出退勤管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:#F0F4F8;color:#1A2B3C;font-size:14px;min-height:100vh}

/* ── LOGIN ── */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;background:#0F1C2E}
.login-logo{font-size:28px;font-weight:600;color:#fff;margin-bottom:4px;font-family:'Space Grotesk',sans-serif;letter-spacing:-.02em}
.login-tagline{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:40px;letter-spacing:.05em}
.login-box{background:#fff;border-radius:18px;padding:26px;width:100%;max-width:340px;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.field-label{font-size:11px;color:#64748B;margin-bottom:6px;display:block;letter-spacing:.06em;text-transform:uppercase}
.login-input{width:100%;padding:13px 14px;border:1px solid #E2E8F0;border-radius:10px;font-size:22px;font-family:'Space Grotesk',sans-serif;outline:none;color:#1A2B3C;letter-spacing:.15em;margin-bottom:6px;transition:.2s}
.login-input:focus{border-color:#4A9FD5;box-shadow:0 0 0 3px rgba(74,159,213,.15)}
.login-btn{width:100%;padding:14px;background:#0F1C2E;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.login-btn:hover:not(:disabled){background:#1a2e46}
.login-btn:disabled{background:#94A3B8;cursor:not-allowed}
.login-err{font-size:12px;color:#E74C3C;margin-top:8px;text-align:center;min-height:18px}
.fb-badge{display:flex;align-items:center;gap:7px;font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:16px}
.fb-badge.loading{background:#F1F5F9;color:#64748B}
.fb-badge.ok{background:#DCFCE7;color:#16A34A}
.fb-badge.err{background:#FEE2E2;color:#DC2626}
.fb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fb-dot.loading{background:#94A3B8}
.fb-dot.ok{background:#16A34A}
.fb-dot.err{background:#DC2626}
.spinner{width:13px;height:13px;border:2px solid rgba(0,0,0,.1);border-top-color:#4A9FD5;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.spinner-white{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── APP SHELL ── */
.app{display:none;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;background:#F0F4F8}
.hdr{background:#0F1C2E;color:#fff;padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.hdr-eyebrow{font-size:10px;opacity:.5;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.hdr-name{font-size:17px;font-weight:500}
.hdr-sub{font-size:11px;opacity:.5;margin-top:2px;font-family:'Space Grotesk',sans-serif}
.logout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:12px;border-radius:20px;padding:6px 14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:.15s;white-space:nowrap}
.logout-btn:hover{background:rgba(255,255,255,.2)}

.tabs{background:#0F1C2E;display:flex;border-top:1px solid rgba(255,255,255,.08)}
.tab{flex:1;padding:11px 0;text-align:center;color:rgba(255,255,255,.4);font-size:13px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:.2s;font-family:'Noto Sans JP',sans-serif}
.tab.active{color:#fff;border-bottom-color:#4A9FD5}

.screen{display:none;padding:16px;flex:1}
.screen.active{display:block}

/* ── TODAY ── */
.today-card{background:#fff;border-radius:16px;border:1px solid #E8EDF2;padding:20px;margin-bottom:14px}
.today-date{font-size:12px;color:#64748B;margin-bottom:8px}
.today-status{display:flex;align-items:center;gap:9px;margin-bottom:18px}
.sdot{width:9px;height:9px;border-radius:50%;background:#CBD5E1;flex-shrink:0;transition:.3s}
.sdot.working{background:#2ECC71;box-shadow:0 0 0 3px rgba(46,204,113,.2)}
.sdot.done{background:#4A9FD5}
.slabel{font-size:16px;font-weight:500}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.time-box{background:#F8FAFC;border-radius:12px;padding:12px 14px;border:1px solid #EEF2F7}
.time-box label{font-size:10px;color:#94A3B8;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.tv{font-size:22px;font-weight:600;font-family:'Space Grotesk',sans-serif;color:#1A2B3C}
.tloc{font-size:10px;color:#4A9FD5;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}

.pin-wrap{height:36px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:12px}
.pin{font-size:24px;transform:translateY(-46px);opacity:0;transition:transform .55s cubic-bezier(.34,1.56,.64,1),opacity .3s}
.pin.drop{transform:translateY(0);opacity:1}

.punch-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-in,.btn-out{border:none;border-radius:14px;color:#fff;padding:16px 0;font-size:15px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.15s;width:100%;font-family:'Noto Sans JP',sans-serif}
.btn-in{background:#2ECC71}
.btn-out{background:#E74C3C}
.btn-in:hover:not(:disabled){filter:brightness(1.07)}
.btn-out:hover:not(:disabled){filter:brightness(1.07)}
.btn-in:active:not(:disabled),.btn-out:active:not(:disabled){transform:scale(.97)}
.btn-in:disabled{background:#A8E6C3;cursor:not-allowed}
.btn-out:disabled{background:#F5B5AF;cursor:not-allowed}
.btn-sub{font-size:11px;opacity:.85}
.sync-note{font-size:11px;text-align:center;color:#94A3B8;margin-top:12px;line-height:1.8;transition:.3s}

/* ── CALENDAR ── */
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-nav-btn{background:#fff;border:1px solid #E8EDF2;border-radius:9px;padding:7px 14px;cursor:pointer;font-size:15px;color:#1A2B3C;transition:.15s}
.cal-nav-btn:hover{background:#F1F5F9}
.cal-month{font-size:16px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.dname{text-align:center;font-size:11px;color:#94A3B8;padding:5px 0}
.ccell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:9px;font-size:13px;cursor:pointer;position:relative;transition:.15s;color:#1A2B3C}
.ccell:hover{background:#E8EDF2}
.ccell.is-today{background:#0F1C2E;color:#fff;font-weight:500}
.ccell .di{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#2ECC71}
.ccell.partial .di{background:#F59E0B}
.ccell.is-today .di{background:#fff}
.ccell.off{color:#CBD5E1}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,28,46,.6);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal-sheet{background:#fff;border-radius:22px 22px 0 0;padding:22px 22px 34px;width:100%;max-width:480px}
.modal-handle{width:40px;height:4px;background:#E2E8F0;border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:16px;font-weight:500;margin-bottom:4px}
.modal-sub{font-size:12px;color:#64748B;margin-bottom:18px}
.rec-row{display:flex;justify-content:space-between;align-items:flex-start;padding:13px 0;border-bottom:1px solid #F1F5F9}
.rec-row:last-child{border:none}
.rec-label{font-size:11px;color:#94A3B8;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.rec-val{font-size:18px;font-weight:500;font-family:'Space Grotesk',sans-serif;color:#1A2B3C}
.rec-loc{font-size:11px;color:#4A9FD5;margin-top:3px}
.rec-hours{font-size:15px;font-weight:500;color:#2ECC71;font-family:'Space Grotesk',sans-serif}
.modal-close{width:100%;margin-top:18px;padding:13px;background:#F8FAFC;border:1px solid #E8EDF2;border-radius:12px;font-size:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:#1A2B3C;transition:.15s}
.modal-close:hover{background:#EEF2F7}
.modal-empty{text-align:center;color:#94A3B8;padding:28px 0;font-size:13px}

/* ── ADMIN ── */
.sec-label{font-size:11px;color:#94A3B8;letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.group-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.g-chip{padding:7px 16px;border-radius:20px;border:1px solid #E8EDF2;background:#fff;font-size:13px;cursor:pointer;transition:.15s;color:#1A2B3C}
.g-chip:hover{background:#F1F5F9}
.g-chip.active{background:#0F1C2E;color:#fff;border-color:#0F1C2E}
.admin-date{font-size:12px;color:#64748B;margin-bottom:14px;padding:10px 14px;background:#fff;border-radius:10px;border:1px solid #E8EDF2}
.staff-card{background:#fff;border-radius:14px;border:1px solid #E8EDF2;padding:15px 16px;margin-bottom:10px;transition:.2s}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.sc-name{font-size:14px;font-weight:500;color:#1A2B3C}
.sc-id{font-size:11px;color:#94A3B8;font-family:'Space Grotesk',sans-serif;margin-top:2px}
.badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500;white-space:nowrap}
.b-working{background:#DCFCE7;color:#16A34A}
.b-done{background:#DBEAFE;color:#1D4ED8}
.b-absent{background:#F1F5F9;color:#94A3B8}
.sc-times{display:flex;gap:18px}
.sc-time label{font-size:10px;color:#94A3B8;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em}
.sc-time span{font-size:14px;font-weight:500;font-family:'Space Grotesk',sans-serif;color:#1A2B3C}
.sc-loc{font-size:10px;color:#4A9FD5;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── LOADING OVERLAY ── */
.loading-overlay{position:fixed;inset:0;background:#0F1C2E;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s}
.loading-overlay.hide{opacity:0;pointer-events:none}
.loading-logo{font-size:28px;font-weight:600;color:#fff;font-family:'Space Grotesk',sans-serif;margin-bottom:8px}
.loading-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:32px}
.loading-bar{width:160px;height:2px;background:rgba(255,255,255,.1);border-radius:1px;overflow:hidden}
.loading-bar-inner{height:100%;background:#4A9FD5;border-radius:1px;animation:loading 1.4s ease-in-out infinite}
@keyframes loading{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-logo">TimeCard</div>
  <div class="loading-sub">Firebase に接続中…</div>
  <div class="loading-bar"><div class="loading-bar-inner"></div></div>
</div>

<!-- LOGIN -->
<div class="login-wrap" id="login-screen" style="display:none">
  <div class="login-logo">TimeCard</div>
  <div class="login-tagline">出退勤管理システム</div>
  <div class="login-box">
    <div class="fb-badge loading" id="fb-badge">
      <div class="spinner"></div>
      <span id="fb-badge-text">接続を確認中…</span>
    </div>
    <label class="field-label">社員NO</label>
    <input class="login-input" id="login-input" type="tel" placeholder="0000" maxlength="6"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()" disabled>
      <div class="spinner-white" id="login-spinner" style="display:none"></div>
      <span id="login-btn-text">ログイン</span>
    </button>
  </div>
</div>

<!-- APP -->
<div class="app" id="main-app">
  <div class="hdr">
    <div>
      <div class="hdr-eyebrow">TimeCard</div>
      <div class="hdr-name" id="hdr-name"></div>
      <div class="hdr-sub" id="hdr-sub"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="today" onclick="showTab('today')">今日</button>
    <button class="tab" data-tab="cal" onclick="showTab('cal')">カレンダー</button>
    <button class="tab" data-tab="admin" onclick="showTab('admin')" id="admin-tab" style="display:none">管理</button>
  </div>

  <!-- TODAY -->
  <div class="screen active" id="screen-today">
    <div class="today-card">
      <div class="today-date" id="today-date"></div>
      <div class="today-status">
        <div class="sdot" id="sdot"></div>
        <div class="slabel" id="slabel">未出勤</div>
      </div>
      <div class="time-row">
        <div class="time-box">
          <label>出勤</label>
          <div class="tv" id="t-in">——:——</div>
          <div class="tloc" id="loc-in"></div>
        </div>
        <div class="time-box">
          <label>退勤</label>
          <div class="tv" id="t-out">——:——</div>
          <div class="tloc" id="loc-out"></div>
        </div>
      </div>
      <div class="pin-wrap"><div class="pin" id="pin">📍</div></div>
      <div class="punch-row">
        <button class="btn-in" id="btn-in" onclick="punch('in')" disabled>
          <span>出勤</span><span class="btn-sub">現在地を記録</span>
        </button>
        <button class="btn-out" id="btn-out" onclick="punch('out')" disabled>
          <span>退勤</span><span class="btn-sub">現在地を記録</span>
        </button>
      </div>
    </div>
    <div class="sync-note" id="sync-note">🔴 Firebase リアルタイム同期中</div>
  </div>

  <!-- CALENDAR -->
  <div class="screen" id="screen-cal">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calShift(-1)">‹</button>
      <div class="cal-month" id="cal-month"></div>
      <button class="cal-nav-btn" onclick="calShift(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-head"></div>
    <div class="cal-grid" id="cal-body"></div>
  </div>

  <!-- ADMIN -->
  <div class="screen" id="screen-admin">
    <div class="sec-label">グループ</div>
    <div class="group-tabs" id="group-tabs"></div>
    <div class="admin-date" id="admin-date"></div>
    <div id="admin-list"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="m-title"></div>
    <div class="modal-sub" id="m-sub"></div>
    <div id="m-body"></div>
    <button class="modal-close" onclick="closeModal()">閉じる</button>
  </div>
</div>

<script type="module">
import { initializeApp }      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, onValue }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

/* ════════════════════════════════
   Firebase 設定
   ════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "AIzaSyA1PUEGZlRzFp96kE8s2U0vQtFnMa7dHxg",
  authDomain:        "timecard-app-17fd9.firebaseapp.com",
  databaseURL:       "https://timecard-app-17fd9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "timecard-app-17fd9",
  storageBucket:     "timecard-app-17fd9.firebasestorage.app",
  messagingSenderId: "638953259653",
  appId:             "1:638953259653:web:5fe1e1ae7ce480fe4b5fec"
};

/* ════════════════════════════════
   社員マスタ
   ════════════════════════════════ */
const STAFF = {
  '0132': { name: '大國　将',       group: '経理',    isLeader: true  },
  '0124': { name: '周藤　美穂',     group: '経理',    isLeader: false },
  '0133': { name: 'テスト　太郎',   group: '経理',    isLeader: false },
  '0134': { name: '中国',           group: 'テストG', isLeader: true  },
  '0135': { name: '環境',           group: 'テストG', isLeader: false },
};

/* ════════════════════════════════
   初期化
   ════════════════════════════════ */
const fbApp = initializeApp(firebaseConfig);
const db    = getDatabase(fbApp);
const DAYS  = ['日','月','火','水','木','金','土'];

let me          = null;
let calY, calM;
let activeGroup = null;
let todayUnsub  = null;
let adminUnsubs = [];

/* ──────── ユーティリティ ──────── */
const dkey = d =>
  `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

const nowHHMM = () => {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
};

const calcHM = (a, b) => {
  const [ah,am] = a.split(':').map(Number);
  const [bh,bm] = b.split(':').map(Number);
  const diff = (bh*60+bm) - (ah*60+am);
  return `${Math.floor(diff/60)}時間${diff%60}分`;
};

/* ──────── Firebase 接続確認 ──────── */
onValue(ref(db, '.info/connected'), snap => {
  const ok = snap.val();
  const badge = document.getElementById('fb-badge');
  const loginBtn = document.getElementById('login-btn');
  if (ok) {
    badge.className = 'fb-badge ok';
    badge.innerHTML = '<div class="fb-dot ok"></div><span>Firebase 接続済み ✓</span>';
    loginBtn.disabled = false;
  } else {
    badge.className = 'fb-badge err';
    badge.innerHTML = '<div class="fb-dot err"></div><span>接続できません。ルールを確認してください</span>';
  }
  // ローディング画面を非表示
  const lo = document.getElementById('loading-overlay');
  lo.classList.add('hide');
  setTimeout(() => lo.style.display = 'none', 500);
  document.getElementById('login-screen').style.display = 'flex';
});

/* ════════════════════════════════
   ログイン / ログアウト
   ════════════════════════════════ */
window.doLogin = async function () {
  const raw = document.getElementById('login-input').value.trim().replace(/\D/g,'');
  const id  = raw.padStart(4,'0');
  const err = document.getElementById('login-err');
  if (!STAFF[id]) { err.textContent = '社員NOが見つかりません'; return; }

  err.textContent = '';
  document.getElementById('login-spinner').style.display = 'block';
  document.getElementById('login-btn-text').textContent = 'ログイン中…';
  document.getElementById('login-btn').disabled = true;

  me = id;
  const s = STAFF[id];
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display    = 'flex';
  document.getElementById('hdr-name').textContent = s.name;
  document.getElementById('hdr-sub').textContent  =
    `${id}　|　${s.group}${s.isLeader ? '　（所属長）' : ''}`;
  document.getElementById('admin-tab').style.display = s.isLeader ? 'block' : 'none';

  const now = new Date();
  calY = now.getFullYear();
  calM = now.getMonth();

  setupTodayListener();
  renderCal();
  if (s.isLeader) { activeGroup = s.group; renderAdmin(); }
};

window.doLogout = function () {
  if (todayUnsub) { todayUnsub(); todayUnsub = null; }
  adminUnsubs.forEach(u => u());
  adminUnsubs = [];
  me = null;

  document.getElementById('main-app').style.display    = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-input').value = '';
  document.getElementById('login-err').textContent = '';
  document.getElementById('login-spinner').style.display = 'none';
  document.getElementById('login-btn-text').textContent = 'ログイン';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('admin-list').innerHTML = '';
  showTab('today');
};

/* ════════════════════════════════
   タブ切り替え
   ════════════════════════════════ */
window.showTab = function (name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
};

/* ════════════════════════════════
   今日の画面（リアルタイム）
   ════════════════════════════════ */
function setupTodayListener () {
  const now = new Date();
  const dk  = dkey(now);
  document.getElementById('today-date').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${DAYS[now.getDay()]}）`;

  if (todayUnsub) todayUnsub();
  todayUnsub = onValue(ref(db, `records/${me}/${dk}`), snap => {
    applyTodayUI(snap.val() || {});
  });
}

function applyTodayUI (rec) {
  const dot = document.getElementById('sdot');
  const lbl = document.getElementById('slabel');
  if      (rec.outTime) { dot.className='sdot done';    lbl.textContent='退勤済'; }
  else if (rec.inTime)  { dot.className='sdot working'; lbl.textContent='出勤中'; }
  else                  { dot.className='sdot';          lbl.textContent='未出勤'; }

  document.getElementById('t-in').textContent  = rec.inTime  || '——:——';
  document.getElementById('t-out').textContent = rec.outTime || '——:——';
  document.getElementById('loc-in').textContent  = rec.inLoc  ? '📍 ' + rec.inLoc  : '';
  document.getElementById('loc-out').textContent = rec.outLoc ? '📍 ' + rec.outLoc : '';
  document.getElementById('btn-in').disabled  = !!rec.inTime;
  document.getElementById('btn-out').disabled = !rec.inTime || !!rec.outTime;
}

/* ════════════════════════════════
   GPS 取得
   ════════════════════════════════ */
function getLocation () {
  return new Promise(resolve => {
    if (!navigator.geolocation) { resolve('位置情報取得不可'); return; }
    navigator.geolocation.getCurrentPosition(
      pos  => resolve(`${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`),
      ()   => resolve('位置情報取得失敗'),
      { timeout: 6000 }
    );
  });
}

/* ════════════════════════════════
   出退勤打刻
   ════════════════════════════════ */
window.punch = async function (type) {
  document.getElementById('btn-in').disabled  = true;
  document.getElementById('btn-out').disabled = true;
  document.getElementById('sync-note').textContent = '📡 位置情報を取得中…';

  const loc     = await getLocation();
  const time    = nowHHMM();
  const todayKey = dkey(new Date());
  const recRef  = ref(db, `records/${me}/${todayKey}`);

  try {
    const snap     = await get(recRef);
    const existing = snap.val() || {};
    const update   = { ...existing, staffName: STAFF[me].name, group: STAFF[me].group };
    if (type === 'in') { update.inTime = time;  update.inLoc  = loc; }
    else               { update.outTime = time; update.outLoc = loc; }
    await set(recRef, update);

    const pin = document.getElementById('pin');
    pin.classList.remove('drop');
    void pin.offsetWidth;
    setTimeout(() => pin.classList.add('drop'), 30);

    document.getElementById('sync-note').textContent = '✅ Firebase に保存しました';
    setTimeout(() =>
      document.getElementById('sync-note').textContent = '🔴 Firebase リアルタイム同期中', 2500);
  } catch (e) {
    document.getElementById('sync-note').textContent = '❌ 保存失敗: ' + e.message;
    document.getElementById('btn-in').disabled  = false;
    document.getElementById('btn-out').disabled = false;
  }
};

/* ════════════════════════════════
   カレンダー
   ════════════════════════════════ */
window.calShift = function (dir) {
  calM += dir;
  if (calM < 0)  { calM = 11; calY--; }
  if (calM > 11) { calM = 0;  calY++; }
  renderCal();
};

async function renderCal () {
  document.getElementById('cal-month').textContent = `${calY}年${calM+1}月`;
  document.getElementById('cal-head').innerHTML =
    DAYS.map(d => `<div class="dname">${d}</div>`).join('');

  const first  = new Date(calY, calM, 1);
  const last   = new Date(calY, calM+1, 0);
  const today  = new Date();
  const snap   = await get(ref(db, `records/${me}`));
  const allRec = snap.val() || {};

  let html = '';
  for (let i = 0; i < first.getDay(); i++) html += '<div></div>';
  for (let d = 1; d <= last.getDate(); d++) {
    const date    = new Date(calY, calM, d);
    const dk      = dkey(date);
    const isToday = dk === dkey(today);
    const rec     = allRec[dk];
    const isOff   = date.getDay() === 0 || date.getDay() === 6;
    let cls = 'ccell' + (isToday ? ' is-today' : '') + (isOff ? ' off' : '');
    if (rec && rec.inTime && !rec.outTime) cls += ' partial';
    const dot = rec && rec.inTime ? '<div class="di"></div>' : '';
    html += `<div class="${cls}" onclick="openModal('${dk}')">${d}${dot}</div>`;
  }
  document.getElementById('cal-body').innerHTML = html;
}

/* ════════════════════════════════
   記録モーダル
   ════════════════════════════════ */
window.openModal = async function (dk) {
  const snap = await get(ref(db, `records/${me}/${dk}`));
  const rec  = snap.val() || {};
  const [y, mo, d] = dk.split('-');
  const date = new Date(+y, +mo-1, +d);
  document.getElementById('m-title').textContent =
    `${y}年${+mo}月${+d}日（${DAYS[date.getDay()]}）`;
  document.getElementById('m-sub').textContent = STAFF[me].name;

  let body = '';
  if (!rec.inTime) {
    body = '<div class="modal-empty">この日の記録はありません</div>';
  } else {
    body += `<div class="rec-row">
      <div>
        <div class="rec-label">出勤時刻</div>
        <div class="rec-val">${rec.inTime}</div>
        ${rec.inLoc ? `<div class="rec-loc">📍 ${rec.inLoc}</div>` : ''}
      </div>
    </div>`;
    body += `<div class="rec-row">
      <div>
        <div class="rec-label">退勤時刻</div>
        <div class="rec-val">${rec.outTime || '—— 勤務中'}</div>
        ${rec.outLoc ? `<div class="rec-loc">📍 ${rec.outLoc}</div>` : ''}
      </div>
    </div>`;
    if (rec.inTime && rec.outTime) {
      body += `<div class="rec-row">
        <div>
          <div class="rec-label">勤務時間</div>
          <div class="rec-hours">${calcHM(rec.inTime, rec.outTime)}</div>
        </div>
      </div>`;
    }
  }
  document.getElementById('m-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('open');
};

window.closeModal = function () {
  document.getElementById('modal-overlay').classList.remove('open');
};

/* ════════════════════════════════
   管理画面（所属長専用・リアルタイム）
   ════════════════════════════════ */
function renderAdmin () {
  const myGroup = STAFF[me].group;
  document.getElementById('group-tabs').innerHTML =
    `<div class="g-chip active">${myGroup}</div>`;

  const now = new Date();
  document.getElementById('admin-date').textContent =
    `📅 ${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${DAYS[now.getDay()]}）の出退勤状況`;

  adminUnsubs.forEach(u => u());
  adminUnsubs = [];
  const list     = document.getElementById('admin-list');
  const todayKey = dkey(now);
  list.innerHTML = '';

  Object.entries(STAFF)
    .filter(([, s]) => s.group === myGroup)
    .forEach(([id, s]) => {
      list.innerHTML += `
        <div class="staff-card" id="sc-${id}">
          <div class="sc-top">
            <div>
              <div class="sc-name">${s.name}${s.isLeader ? ' 👑' : ''}</div>
              <div class="sc-id">${id}　${s.group}</div>
            </div>
            <div class="badge b-absent" id="badge-${id}">未出勤</div>
          </div>
          <div class="sc-times">
            <div class="sc-time"><label>出勤</label><span id="sin-${id}">—</span></div>
            <div class="sc-time"><label>退勤</label><span id="sout-${id}">—</span></div>
          </div>
          <div class="sc-loc" id="sloc-${id}"></div>
        </div>`;

      const unsub = onValue(ref(db, `records/${id}/${todayKey}`), snap => {
        const rec   = snap.val() || {};
        const badge = document.getElementById(`badge-${id}`);
        if (badge) {
          if      (rec.outTime) { badge.className='badge b-done';    badge.textContent='退勤済'; }
          else if (rec.inTime)  { badge.className='badge b-working'; badge.textContent='出勤中'; }
          else                  { badge.className='badge b-absent';  badge.textContent='未出勤'; }
        }
        const sinEl  = document.getElementById(`sin-${id}`);
        const soutEl = document.getElementById(`sout-${id}`);
        const slocEl = document.getElementById(`sloc-${id}`);
        if (sinEl)  sinEl.textContent  = rec.inTime  || '—';
        if (soutEl) soutEl.textContent = rec.outTime || '—';
        if (slocEl) slocEl.textContent = rec.inLoc ? '📍 ' + rec.inLoc : '';
      });
      adminUnsubs.push(unsub);
    });
}
</script>
